name: Deploy Pipeline Component

on:
  workflow_call:
    inputs:
      release_version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string

env:
  PAYSHIELD_DIRECTORY: /opt/payshield

jobs:
  deploy:
    name: SSH Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd ${{ env.PAYSHIELD_DIRECTORY }}

            sed -i 's/^PAYSHIELD_APPLICATION_VERSION=.*/PAYSHIELD_APPLICATION_VERSION=${{ inputs.release_version }}/' .env

            docker compose pull
            docker compose up -d
            docker compose ps
